# Build the production image in GitHub Actions and ask Coolify to deploy it.
name: Build and deploy

on:
  push:
    branches:
      - main

# Never overlap deployments for the same workflow/branch. A newer push replaces
# an older queued run so Coolify only receives the image that should be live.
concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# The token needs package write access for GHCR; repository contents are only
# checked out, so read access is sufficient there.
permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Derive image tags and labels
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/muslimmujahid/buku-hadir
          tags: |
            # Keep a stable tag for Coolify and an immutable short-SHA tag for rollbacks.
            type=raw,value=latest
            type=sha,format=short

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      # Coolify is configured to pull the image above. The webhook starts its
      # redeploy after the push has completed successfully. Pin the deploy to
      # the immutable short-SHA tag so a stale `latest` is never pulled.
      #
      # NOTE: This API call requires a Coolify API token with write permission.
      # If the token lacks it, the deployment falls back to the mutable `latest`
      # tag and continues so the site is not left broken.
      - name: Update Coolify IMAGE_TAG env var
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          APP_UUID=$(echo "$COOLIFY_WEBHOOK" | sed -n 's/.*[?&]uuid=\([^&]*\).*/\1/p')
          COOLIFY_BASE_URL=$(echo "$COOLIFY_WEBHOOK" | awk -F '/api/v1' '{print $1}')
          curl --fail --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"data\":[{\"key\":\"IMAGE_TAG\",\"value\":\"$IMAGE_TAG\"}]}" \
            "${COOLIFY_BASE_URL}/api/v1/applications/${APP_UUID}/envs/bulk" || {
              echo "WARNING: Could not update IMAGE_TAG in Coolify (token may lack write permission)."
              echo "         Deployment will use the latest tag. Consider creating a Coolify API token with write permission."
            }

      - name: Trigger Coolify redeploy
        env:
          COOLIFY_WEBHOOK: ${{ secrets.COOLIFY_WEBHOOK }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $COOLIFY_API_TOKEN" \
            --url "$COOLIFY_WEBHOOK"
